name: Flutter Continuous Integration Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static_analysis:
    name: Code Quality Inspection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Provision Java runtime
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Flutter toolchain
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Resolve external dependencies
        run: flutter pub get

      - name: Execute linter daemon
        run: flutter analyze